<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<h2>Medikament hinzufügen</h2>

<form th:action="@{/medikament/add}" th:object="${medikament}" method="post">

  Name: <input type="text" th:field="*{name}"><br>
  Hersteller: <input type="text" th:field="*{hersteller}"><br>
  Ablaufdatum: <input type="date" th:field="*{ablaufdatum}"><br>

  <button type="submit">Speichern</button>

</form>

</body>
</html>
